<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HCM202 - NEW - SOẠN ĐỘC QUYỀN BỞI THỦY TIÊN</title>
    <style>
        :root { --primary: #2563eb; --primary-dark: #1d4ed8; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --success: #16a34a; --error: #dc2626; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); line-height: 1.6; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; padding: 20px; background: var(--card); border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        h1 { color: var(--primary); font-size: 1.8rem; margin-bottom: 10px; }
        .stats { display: flex; justify-content: center; gap: 20px; margin-top: 15px; flex-wrap: wrap; }
        .stat-box { background: var(--bg); padding: 10px 20px; border-radius: 8px; font-weight: 600; border: 1px solid #e2e8f0; }
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.2s; background: #e2e8f0; color: var(--text); }
        .btn.active { background: var(--primary); color: white; }
        .btn:hover:not(.active) { background: #cbd5e1; }
        .view { display: none; background: var(--card); padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .view.active { display: block; }

      

        /* Flashcard */
        .flashcard { perspective: 1000px; height: 300px; cursor: pointer; margin-bottom: 20px; }
        .flashcard-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; }
        .flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }
        .flashcard-front, .flashcard-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; border-radius: 12px; border: 2px solid #e2e8f0; background: white; }
        .flashcard-back { transform: rotateY(180deg); background: #f0fdf4; border-color: var(--success); }
        .fc-controls { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        
        /* Quiz */
        .quiz-question { font-size: 1.2rem; font-weight: 600; margin-bottom: 20px; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .option { padding: 15px; border: 2px solid #e2e8f0; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
        .option:hover { border-color: var(--primary); background: #eff6ff; }
        .option.correct { background: #dcfce7; border-color: var(--success); color: var(--success); }
        .option.wrong { background: #fee2e2; border-color: var(--error); color: var(--error); }
        .option.disabled { pointer-events: none; opacity: 0.7; }
        
        /* List */
        .search-box { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; margin-bottom: 20px; font-size: 1rem; }
        .q-list { display: flex; flex-direction: column; gap: 15px; max-height: 600px; overflow-y: auto; }
        .q-item { padding: 15px; border: 1px solid #e2e8f0; border-radius: 8px; background: #f8fafc; }
        .q-item strong { color: var(--primary); display: block; margin-bottom: 8px; }
        .q-item .ans { color: var(--success); font-weight: bold; margin-top: 8px; }

        .hidden { display: none !important; }
        .progress-bar { width: 100%; height: 8px; background: #e2e8f0; border-radius: 4px; margin: 15px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.3s; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>HCM202 - NEW - SOẠN ĐỘC QUYỀN BỞI THỦY TIÊN</h1>
            <p>Ôn luyện thông minh</p>
            <div class="stats">
                <div class="stat-box">Tổng: <span id="totalQ">398</span></div>
                <div class="stat-box">Đã học: <span id="learnedQ">0</span></div>
                <div class="stat-box">Đánh dấu: <span id="markedQ">0</span></div>
            </div>
        </header>

        <div class="nav-tabs">
            <button class="btn active" onclick="switchView('flashcard')">🃏 Flashcard</button>
            <button class="btn" onclick="switchView('quiz')">📝 Trắc Nghiệm</button>
            <button class="btn" onclick="switchView('list')">📋 Danh Sách</button>
            <button class="btn" onclick="switchView('test')">🎯 Kiểm Tra Nhanh</button>
        </div>

        <!-- Flashcard View -->
        <div id="flashcard" class="view active">
            <div class="progress-bar"><div class="progress-fill" id="fcProgress"></div></div>
            <div class="flashcard" onclick="this.classList.toggle('flipped')">
                <div class="flashcard-inner">
                    <div class="flashcard-front">
                        <h3 id="fcQuestion">Câu hỏi...</h3>
                        <p style="margin-top:15px; color:#64748b; font-size:0.9rem;">(Chạm để lật xem đáp án)</p>
                    </div>
                    <div class="flashcard-back">
                        <h3 id="fcAnswer" style="color:var(--success)">Đáp án...</h3>
                        <div id="fcOptions" style="margin-top:15px; text-align:left; width:100%; font-size:0.95rem;"></div>
                    </div>
                </div>
            </div>
            <div class="fc-controls">
                <button class="btn" onclick="prevCard()">← Trước</button>
                <button class="btn" onclick="toggleMark()" id="markBtn">🚩 Đánh dấu</button>
                <button class="btn" onclick="nextCard()">Tiếp →</button>
            </div>
        </div>

        <!-- Quiz View -->
        <div id="quiz" class="view">
            <div class="progress-bar"><div class="progress-fill" id="quizProgress"></div></div>
             <!-- Nhảy tới câu -->
    <div style="display:flex; gap:10px; margin:15px 0;">
        <input
            type="number"
            id="jumpQuestion"
            min="1"
            placeholder="Nhập số câu..."
            style="flex:1; padding:10px; border:1px solid #ccc; border-radius:8px;"
        >
        <button class="btn" onclick="jumpToQuestion()">Đến câu</button>
    </div>

            <div class="quiz-question" id="quizQuestion">Câu hỏi...</div>
            <div class="options" id="quizOptions"></div>
            <div style="margin-top:20px; display:flex; justify-content:space-between;">
                <button class="btn" onclick="prevQuiz()">← Trước</button>
                <button class="btn" onclick="nextQuiz()">Tiếp →</button>
            </div>
        </div>

        <!-- List View -->
        <div id="list" class="view">
            <input type="text" class="search-box" placeholder="🔍 Tìm kiếm câu hỏi..." oninput="filterList(this.value)">
            <div class="q-list" id="qList"></div>
        </div>

        <!-- Test View -->
        <div id="test" class="view">
            <div style="text-align:center; padding: 40px;">
                <h2>Kiểm tra ngẫu nhiên 20 câu</h2>
                <p>Bạn sẽ làm 20 câu hỏi ngẫu nhiên. Hệ thống sẽ chấm điểm ngay lập tức.</p>
                <button class="btn" style="background:var(--primary); color:white; margin-top:20px; font-size:1.1rem;" onclick="startTest()">Bắt đầu làm bài</button>
            </div>
            <div id="testArea" class="hidden">
                <div class="progress-bar"><div class="progress-fill" id="testProgress"></div></div>
                <div class="quiz-question" id="testQuestion"></div>
                <div class="options" id="testOptions"></div>
                <div style="margin-top:20px; text-align:right;">
                    <button class="btn" onclick="nextTest()">Câu tiếp theo →</button>
                </div>
            </div>
            <div id="testResult" class="hidden" style="text-align:center; padding:40px;">
                <h2>Kết quả: <span id="testScore" style="color:var(--primary); font-size:2rem;"></span>/20</h2>
                <button class="btn" style="margin-top:20px;" onclick="switchView('test'); document.getElementById('testArea').classList.add('hidden'); document.getElementById('testResult').classList.add('hidden');">Làm lại</button>
            </div>
        </div>
    </div>

    <script>
        
        const questions = [

  {

  {

        // State management
        let currentCard = 0;
        let currentQuiz = 0;
        let learned = new Set();
        let marked = new Set();
        let testQuestions = [];
        let testCurrent = 0;
        let testScore = 0;

        // Init
        document.getElementById('totalQ').innerText = questions.length;
        updateStats();
        renderCard();
        renderQuiz();
        renderList();

        function updateStats() {
            document.getElementById('learnedQ').innerText = learned.size;
            document.getElementById('markedQ').innerText = marked.size;
        }

        function switchView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            document.querySelectorAll('.nav-tabs .btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            if(viewId === 'list') renderList();
        }

        // Flashcard Logic
        function renderCard() {
            const q = questions[currentCard];
            document.getElementById('fcQuestion').innerText = `Câu ${currentCard + 1}: ${q.q}`;
            document.getElementById('fcAnswer').innerText = `Đáp án: ${q.a}`;
            document.getElementById('fcOptions').innerHTML = q.o.map(opt => `<div style="margin:5px 0; padding:5px; background:#f1f5f9; border-radius:4px;">${opt}</div>`).join('');
            document.getElementById('fcProgress').style.width = `${((currentCard + 1) / questions.length) * 100}%`;
            document.querySelector('.flashcard').classList.remove('flipped');
            
            const btn = document.getElementById('markBtn');
            if(marked.has(currentCard)) {
                btn.innerText = '🚩 Bỏ đánh dấu';
                btn.style.background = '#fee2e2';
                btn.style.color = '#dc2626';
            } else {
                btn.innerText = '🚩 Đánh dấu';
                btn.style.background = '#e2e8f0';
                btn.style.color = '#1e293b';
            }
        }

        function nextCard() {
            learned.add(currentCard);
            if (currentCard < questions.length - 1) {
                currentCard++;
                renderCard();
                updateStats();
            }
        }

        function prevCard() {
            if (currentCard > 0) {
                currentCard--;
                renderCard();
            }
        }

        function toggleMark() {
            if (marked.has(currentCard)) marked.delete(currentCard);
            else marked.add(currentCard);
            renderCard();
            updateStats();
        }

        // Quiz Logic
        function renderQuiz() {
            const q = questions[currentQuiz];
            document.getElementById('quizQuestion').innerText = `Câu ${currentQuiz + 1}: ${q.q}`;
            document.getElementById('quizProgress').style.width = `${((currentQuiz + 1) / questions.length) * 100}%`;
            const optsDiv = document.getElementById('quizOptions');
            optsDiv.innerHTML = '';
            q.o.forEach((opt, idx) => {
                const div = document.createElement('div');
                div.className = 'option';
                div.innerText = opt;
                div.onclick = () => checkQuizAnswer(div, opt, q.a, idx);
                optsDiv.appendChild(div);
            });
        }

        function checkQuizAnswer(el, selected, correct, idx) {
            const opts = document.querySelectorAll('#quizOptions .option');
            opts.forEach(o => o.classList.add('disabled'));
            
            const isCorrect = correct.includes(selected.charAt(0));
            if (isCorrect) {
                el.classList.add('correct');
                learned.add(currentQuiz);
                updateStats();
            } else {
                el.classList.add('wrong');
                // Highlight correct one
                opts.forEach(o => {
                    if (correct.includes(o.innerText.charAt(0))) o.classList.add('correct');
                });
            }
        }

        function nextQuiz() {
            if (currentQuiz < questions.length - 1) {
                currentQuiz++;
                renderQuiz();
            }
        }

        function prevQuiz() {
            if (currentQuiz > 0) {
                currentQuiz--;
                renderQuiz();
            }
        }

        function jumpToQuestion() {
    const num = parseInt(document.getElementById("jumpQuestion").value);

    if (isNaN(num) || num < 1 || num > questions.length) {
        alert("Số câu không hợp lệ!");
        return;
    }

    currentQuiz = num - 1;
    renderQuiz();
}

        // List Logic
        function renderList(filter = '') {
            const listDiv = document.getElementById('qList');
            listDiv.innerHTML = '';
            const lowerFilter = filter.toLowerCase();
            
            questions.forEach((q, idx) => {
                if (lowerFilter && !q.q.toLowerCase().includes(lowerFilter) && !q.o.some(o => o.toLowerCase().includes(lowerFilter))) return;
                
                const div = document.createElement('div');
                div.className = 'q-item';
                div.innerHTML = `
                    <strong>Câu ${idx + 1}: ${q.q}</strong>
                    <div style="margin-left:15px; color:#475569;">
                        ${q.o.map(o => `<div>${o}</div>`).join('')}
                    </div>
                    <div class="ans">Đáp án: ${q.a}</div>
                `;
                listDiv.appendChild(div);
            });
        }

        function filterList(val) {
            renderList(val);
        }

        // Test Logic
        function startTest() {
            testQuestions = [...questions].sort(() => 0.5 - Math.random()).slice(0, 20);
            testCurrent = 0;
            testScore = 0;
            document.querySelector('#test > div:first-child').classList.add('hidden');
            document.getElementById('testArea').classList.remove('hidden');
            document.getElementById('testResult').classList.add('hidden');
            renderTest();
        }

        function renderTest() {
            const q = testQuestions[testCurrent];
            document.getElementById('testQuestion').innerText = `Câu ${testCurrent + 1}/20: ${q.q}`;
            document.getElementById('testProgress').style.width = `${((testCurrent + 1) / 20) * 100}%`;
            const optsDiv = document.getElementById('testOptions');
            optsDiv.innerHTML = '';
            q.o.forEach(opt => {
                const div = document.createElement('div');
                div.className = 'option';
                div.innerText = opt;
                div.onclick = () => {
                    const isCorrect = q.a.includes(opt.charAt(0));
                    if (isCorrect) testScore++;
                    nextTest();
                };
                optsDiv.appendChild(div);
            });
        }

        function nextTest() {
            if (testCurrent < 19) {
                testCurrent++;
                renderTest();
            } else {
                document.getElementById('testArea').classList.add('hidden');
                document.getElementById('testResult').classList.remove('hidden');
                document.getElementById('testScore').innerText = testScore;
            }
        }
    </script>
